# Example Secret — replace values before applying to a real cluster.
# In production, manage with sealed-secrets / external-secrets / SOPS rather
# than committing plain values. `stringData` accepts raw strings; Kubernetes
# base64-encodes them on write.
apiVersion: v1
kind: Secret
metadata:
  name: trading-platform-secrets
  namespace: trading-platform
type: Opaque
stringData:
  SECRET_KEY: "replace-me-with-a-long-random-string"
  ANTHROPIC_API_KEY: "sk-ant-replace-me"

  # Database
  POSTGRES_PASSWORD: "replace-me"
  DATABASE_URL: "postgresql://trading:replace-me@postgres:5432/trading"

  # MinIO / S3
  MINIO_ACCESS_KEY: "minio"
  MINIO_SECRET_KEY: "replace-me"
