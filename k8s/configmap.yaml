apiVersion: v1
kind: ConfigMap
metadata:
  name: trading-platform-config
  namespace: trading-platform
data:
  # IBKR Gateway
  IB_GATEWAY_HOST: "ib-gateway"
  IB_GATEWAY_PORT: "4003"
  IB_CLIENT_ID: "1"
  TRADING_MODE: "paper"

  # Runtime
  LOG_LEVEL: "INFO"
  MOCK_MODE: "false"
  PRODUCTION_MODE: "true"

  # CORS — dashboard origin(s)
  CORS_ORIGINS: "https://dashboard.trading.local"

  # Rate limiting
  RATE_LIMIT_REQUESTS: "120"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  RATE_LIMIT_EXEMPT_PATHS: "/health,/,/ws,/metrics"
  MAX_STRING_LENGTH: "10000"

  # Postgres host/db (password lives in Secret)
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "trading"
  POSTGRES_USER: "trading"

  # MinIO endpoint and bucket (access key/secret in Secret)
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "logos"

  # Claude
  CHAT_MODEL: "claude-opus-4-7"

  # Dashboard
  NEXT_PUBLIC_API_URL: "https://api.trading.local"
  NEXT_PUBLIC_WS_URL: "wss://api.trading.local/ws"
  API_URL: "http://trading-api:8000"
